<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
        <title>EJEMPLO SHADOW DOM</title>
    <style>
        input{
            padding:8px;
            margin:5px;
        }
        button{
            padding:8px;
        }
    </style>
</head>
<body>

<h2>Ejemplo Shadow DOM</h2>

<div id="nombre-component">
    <input id="txtNombre" placeholder="Nombre">
    <button id="btnValidarNombre">Validar Nombre</button>
    <span id="outputNombre"></span>
</div>
<div id="apellido-component"></div>

<script>
    // Validar nombre
    document.getElementById("btnValidarNombre").addEventListener("click", () => {
        document.getElementById("outputNombre").innerText = "Su nombre es " + document.getElementById("txtNombre").value; 
    });

    // Contenedor del Shadow DOM
    const host = document.getElementById("apellido-component");

    // Creamos un Shadow DOM tipo OPEN
    const shadow = host.attachShadow({ mode: "open" });

    shadow.innerHTML = `
        <style>
            input{
                padding:8px;
                margin:5px;
            }
            button{
                padding:8px;
            }
        </style>

        <input id="txtApellido" placeholder="Apellido">
        <button id="btnValidarApellido">Validar Apellido</button>
        <span id="outputApellido"></span>
    `;

    shadow.getElementById("btnValidarApellido")
        .addEventListener("click", () => {
            shadow.getElementById("outputApellido").innerText = "Su apellido es " + shadow.getElementById("txtApellido").value; 
        });
</script>

</body>
</html>
